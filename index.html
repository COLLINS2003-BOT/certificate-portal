<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABRSM Certificate Validation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#111;
}

/* HEADER */
.header{
    background:#111;
    color:white;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#e10600;
    letter-spacing:1px;
}

.menu-btn{
    font-size:22px;
    cursor:pointer;
    border:1px solid #777;
    padding:6px 10px;
    border-radius:6px;
}

/* SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:100%;
    height:100%;
    background:#111;
    color:#ccc;
    transition:0.4s;
    padding-top:80px;
    z-index:1000;
}

.side-menu.active{
    right:0;
}

.nav-item{
    padding:14px 25px;
    font-size:15px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid #1d1d1d;
}

.nav-item i{
    color:#999;
}

/* CONTENT */
.content{
    background:#efefef;
    padding:25px 18px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
}

.content h1{
    font-size:22px;
    font-weight:normal;
    color:#333;
}

.content p{
    font-size:14px;
    color:#666;
}

/* CERTIFICATE CARD */
.certificate{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:15px;
}

.certificate h2{
    font-weight:normal;
    color:#444;
}

.details{
    margin-top:20px;
    font-size:14px;
}

.details div{
    margin-bottom:10px;
}

.label{
    color:#777;
}

/* CHAT BUTTON */
.chat-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    width:55px;
    height:55px;
    background:#222;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">ABRSM</div>
    <div class="menu-btn" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>
</div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
    <div class="nav-item"><i class="fa-solid fa-right-to-bracket
